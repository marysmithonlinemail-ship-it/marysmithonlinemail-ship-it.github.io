<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #ececec, #d4d4d4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 50px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 450px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        p {
            font-size: 17px;
            color: #555;
            margin-bottom: 25px;
        }

        img {
            width: 80%;
            border-radius: 10px;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>My portfolio is in progress. Check back soon.</p>
        <img src="comingsoon.jpg" alt="Coming Soon Image">
    </div>
</body>
</html>
